<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    {% if messages %}
    {% for message in messages %}
        <div style="padding:10px; margin:10px 0; border:1px solid #ccc; background:#f8f8f8;">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
    <fieldset>
        <legend> Login </legend>
        <form method="POST">
            {% csrf_token %}

            Username:
            <input type="text" name="username">
            <br><br>

            Password:
            <input type="password" name="password">
            <br><br>

            <button type="submit">Login</button>

        </form>
    </fieldset>
</body>
</html>
